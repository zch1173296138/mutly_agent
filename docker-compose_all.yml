version: '3.8'

services:
  db:
    image: postgres:15
    container_name: deep_researcher_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
      POSTGRES_DB: deep_researcher
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data # 数据持久化，防止容器重启数据丢失

volumes:
  pgdata: